<!DOCTYPE html>
<html class="light" lang="en">



<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Login - Customer</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔒</text></svg>" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="styles.css?v=2.1" />
    <link rel="stylesheet" href="premium-styles.css?v=2.1" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#2563eb",
                        "emerald-custom": "#059669",
                        "background-light": "#f8faff",
                        "background-dark": "#0f172a",
                    },
                    fontFamily: {
                        "sans": ["system-ui", "-apple-system", "BlinkMacSystemFont", "Segoe UI", "Roboto", "Arial", "sans-serif"]
                    },
                },
            },
        }
    </script>
    <style>
        .login-bg {
            background: radial-gradient(circle at 0% 0%, rgba(37, 99, 235, 0.05) 0%, transparent 50%),
                        radial-gradient(circle at 100% 100%, rgba(5, 150, 105, 0.05) 0%, transparent 50%);
        }
    </style>
</head>

<body class="font-sans bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 min-h-screen flex items-center justify-center p-4 login-bg mesh-gradient">
    <div class="w-full max-w-md animate-fade-in-up">
        <!-- Logo/Title -->
        <div class="flex flex-col items-center mb-8">
            <div class="size-12 bg-primary rounded-2xl flex items-center justify-center text-white shadow-lg shadow-primary/20 mb-4">
                <span class="material-symbols-outlined text-[32px]">analytics</span>
            </div>
            <h1 class="text-3xl font-bold tracking-tight text-slate-900 dark:text-white">Submission Management</h1>
            <p class="text-slate-500 dark:text-slate-400 mt-2">Sign in to access your dashboard</p>
        </div>

        <!-- Login Card -->
        <div class="premium-card bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 p-8 shadow-2xl rounded-2xl">
            <form id="loginForm" onsubmit="handleLogin(event)" class="space-y-6">
                <!-- Email Field -->
                <div class="space-y-2">
                    <label for="email" class="text-sm font-semibold text-slate-700 dark:text-slate-300 ml-1">Email Address</label>
                    <div class="relative group">
                        <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-slate-400 group-focus-within:text-primary transition-colors">
                            <span class="material-symbols-outlined text-[20px]">mail</span>
                        </div>
                        <input type="email" id="email" required
                            class="premium-input w-full pl-11 pr-4 py-3 rounded-xl bg-slate-50 dark:bg-slate-800 border-slate-200 dark:border-slate-700 focus:ring-2 focus:ring-primary focus:border-transparent outline-none transition-all placeholder:text-slate-400"
                            placeholder="name@corp.com" />
                    </div>
                </div>


                <div class="space-y-2">
                    <div class="flex justify-between items-center ml-1">
                        <label for="password" class="text-sm font-semibold text-slate-700 dark:text-slate-300">Password</label>
                        <a href="#" class="text-xs font-semibold text-primary hover:underline">Forgot Password?</a>
                    </div>
                    <div class="relative group">
                        <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-slate-400 group-focus-within:text-primary transition-colors">
                            <span class="material-symbols-outlined text-[20px]">lock</span>
                        </div>
                        <input type="password" id="password" required
                            class="premium-input w-full pl-11 pr-4 py-3 rounded-xl bg-slate-50 dark:bg-slate-800 border-slate-200 dark:border-slate-700 focus:ring-2 focus:ring-primary focus:border-transparent outline-none transition-all placeholder:text-slate-400"
                            placeholder="••••••••" />
                    </div>
                </div>

                <!-- Remember Me -->
                <div class="flex items-center gap-2 ml-1">
                    <input type="checkbox" id="remember" class="size-4 rounded border-slate-300 text-primary focus:ring-primary cursor-pointer" />
                    <label for="remember" class="text-sm text-slate-600 dark:text-slate-400 cursor-pointer select-none">Remember this device</label>
                </div>

                <!-- Login Button -->
                <button type="submit" class="w-full btn-premium-primary bg-primary text-white py-3.5 rounded-xl font-bold text-lg transition-all hover:scale-[1.02] active:scale-[0.98] shadow-lg shadow-primary/20">
                    Sign In
                </button>
            </form>

            <!-- Footer Links -->
            <div class="mt-8 pt-6 border-t border-slate-100 dark:border-slate-800 text-center">
                <p class="text-sm text-slate-500 dark:text-slate-400">
                    Don't have an account? 
                    <a href="#" class="text-primary font-semibold hover:underline">Contact Administrator</a>
                </p>
            </div>
        </div>

        <!-- System Status -->
        <div class="mt-8 flex items-center justify-center gap-4 text-xs font-medium text-slate-400">
            <div class="flex items-center gap-1.5">
                <span class="size-1.5 rounded-full bg-emerald-500"></span>
                System Operational
            </div>
            <div class="size-1 bg-slate-300 dark:bg-slate-700 rounded-full"></div>
            <span>v2.1.0</span>
        </div>
    </div>

    <script>
        function handleLogin(event) {
            event.preventDefault();
            
            // Get email input value
            const emailInput = document.getElementById('email');
            const email = emailInput.value;
            
            // Extract username from email (part before @)
            const username = email.split('@')[0];
            
            // Store username in localStorage
            localStorage.setItem('loggedInUser', username);
            localStorage.setItem('userEmail', email);
            localStorage.setItem('loginTimestamp', new Date().toISOString());
            
            // Redirect to dashboard
            window.location.href = 'index.html';
        }
    </script>
</body>

</html>
